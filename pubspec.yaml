name: nduthi
description: A production-grade motorbike ride-hailing application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management (Riverpod 2.x)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Firebase Core and Services
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.1

  # Location and Mapping
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0

  # UI and Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation tools for Riverpod
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true